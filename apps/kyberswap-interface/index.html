    <style type="text/css" class="preloadhtml-style">
      .preloadhtml {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        font-family: 'Work Sans', 'Inter var', sans-serif;
      }

      .preloadhtml {
        background-color: #0f0f0f;
      }

      .preloadhtml-header {
        display: flex;
        gap: 12px;
        padding: 1rem;
        z-index: 2;
      }

      .preloadhtml-logo {
        height: 51.38px;

        .kyber-logo {
          width: 140px;
          margin-top: 1px;

          @media screen and (max-width: 768px) {
            width: 100px;
          }
        }
      }

      .preloadhtml-header-link {
        display: flex;
        gap: 4px;
        align-items: center;

        @media screen and (max-width: 992px) {
          gap: 0px;
          justify-content: flex-end;
          width: 100%;
          height: 36px;
          margin-top: 1px;
        }
      }

      .preloadhtml-header-link-item {
        font-size: 16px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .preloadhtml-header-link-item {
        color: rgb(169, 169, 169);

        &.active {
          color: #31cb9e;
        }
      }

      .preloadhtml-header-link-label {
        display: flex;
        padding: 8px 12px;

        &:has(+ .preloadhtml-dropdown-icon) {
          padding: 8px 0px 8px 6px;
        }
      }

      .preloadhtml-new-label {
        font-size: 10px;
        margin-left: 4px;
        color: #ff537b;
      }

      .mobile-hidden {
        @media screen and (max-width: 768px) {
          display: none;
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }

        60% {
          transform: scale(1.1);
        }

        100% {
          transform: scale(1);
        }
      }
    </style>
