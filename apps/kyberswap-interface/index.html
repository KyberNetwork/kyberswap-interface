    <!-- Structured data — id lets the client <RouteSeo> update THIS block in place instead of appending
         a duplicate. Static pages and product shells replace it via the ssr-seo markers. -->
    <script type="application/ld+json" id="kyberswap-structured-data">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "KyberSwap",
            "url": "https://kyberswap.com/",
            "logo": "https://kyberswap.com/favicon.png?version=v1",
            "sameAs": ["https://t.me/kybernetwork", "https://x.com/KyberNetwork", "https://discord.gg/kyberswap"]
          },
          {
            "@type": "WebSite",
            "name": "KyberSwap",
            "url": "https://kyberswap.com/"
          }
        ]
      }
    </script>
    <!-- ssr-seo:end -->

    <!-- Platform verification -->
    <meta name="fortmatic-site-verification" content="j93LgcVZk79qcgyo" />

    <!-- Cache behavior -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <meta http-equiv="Expires" content="0" />

    <!-- App manifest and assets -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="preload" as="image" href="/logo-dark.svg" />

    <!-- Data APIs: warm DNS + TLS for the origins hit on initial load. JSON APIs are CORS fetches, so
         they reuse a `crossorigin` connection; the image CDN is loaded without CORS, so no crossorigin. -->
    <link rel="preconnect" href="https://ks-setting.kyberswap.com" crossorigin />
    <link rel="preconnect" href="https://token-api.kyberswap.com" crossorigin />
    <link rel="preconnect" href="https://aggregator-api.kyberswap.com" crossorigin />
    <link rel="preconnect" href="https://storage.googleapis.com" />
    <link rel="dns-prefetch" href="https://ethereum-rpc.kyberswap.com" />
    <link rel="dns-prefetch" href="https://earn-service.kyberswap.com" />
    <link rel="dns-prefetch" href="https://common-service.kyberswap.com" />

    <!-- Fonts -->

    <script>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="app"></div>
    <script type="module" src="/src/index.tsx"></script>

    <style type="text/css" class="preloadhtml-style">
      .preloadhtml {
        position: fixed;
        z-index: 9999;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        font-family: 'Work Sans', sans-serif;
      }

      .preloadhtml {
        background-color: #0f0f0f;
      }

      .preloadhtml-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 1rem;
        z-index: 2;
      }

      .preloadhtml-logo {
        display: flex;
        min-height: 48px;
        align-items: center;

        @media screen and (max-width: 768px) {
          min-height: 36px;
        }

        .kyber-logo {
          width: 140px;
          margin-top: -2px;

          @media screen and (max-width: 768px) {
            width: 100px;
          }
        }
      }

      .preloadhtml-header-link {
        display: flex;
        flex-flow: row nowrap;
        gap: 4px;
        align-items: center;
        justify-content: center;

        @media screen and (max-width: 1200px) {
          justify-content: flex-end;
        }

        @media screen and (max-width: 992px) {
          width: 100%;
        }
      }

      .preloadhtml-header-link-item {
        font-size: 16px;
        font-weight: 500;
        line-height: normal;
        display: flex;
        align-items: center;
        gap: 2px;
        width: fit-content;
        user-select: none;
      }

      .preloadhtml-header-link-item {
        color: rgb(169, 169, 169);

        &.active {
          color: #31cb9e;
        }
      }

      .preloadhtml-header-link-label {
        display: inline-flex;
        width: fit-content;
        cursor: pointer;
        padding: 8px 12px;

        &:has(+ .preloadhtml-dropdown-icon) {
          padding: 8px 0px 8px 6px;
        }

        @media screen and (max-width: 768px) {
          &:not(:has(+ .preloadhtml-dropdown-icon)) {
            padding-right: 6px;
            padding-left: 6px;
          }
        }
      }

      .preloadhtml-earn-label {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .preloadhtml-new-label {
        font-size: 10px;
        margin-left: 4px;
        color: #ff537b;
      }

      .hide-max-500 {
        @media screen and (max-width: 500px) {
          display: none;
        }
      }

      .hide-max-576 {
        @media screen and (max-width: 576px) {
          display: none;
        }
      }

      .hide-max-768 {
        @media screen and (max-width: 768px) {
          display: none;
        }
      }

      .hide-max-992 {
        @media screen and (max-width: 992px) {
          display: none;
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }

        60% {
          transform: scale(1.1);
        }

        100% {
          transform: scale(1);
        }
      }
    </style>
    <div class="preloadhtml">
      <!-- Dropdown-arrow glyph inlined once (shared by the nav items below) so the cold-load header needs
           no separate /icons/down.svg request to paint a complete first frame. -->
      <svg width="0" height="0" style="position: absolute" aria-hidden="true">
        <symbol id="ks-preload-down" viewBox="0 0 24 24">
          <path
            d="M8.71005 11.71L11.3001 14.3C11.6901 14.69 12.3201 14.69 12.7101 14.3L15.3001 11.71C15.9301 11.08 15.4801 10 14.5901 10H9.41005C8.52005 10 8.08005 11.08 8.71005 11.71Z"
            fill="#a9a9a9"
          />
        </symbol>
      </svg>
      <div class="preloadhtml-header">
        <div class="preloadhtml-logo">
          <img class="kyber-logo" src="/logo-dark.svg" alt="DmmLogo" />
        </div>
        <div class="preloadhtml-header-link">
          <div class="preloadhtml-header-link-item active">
            <div class="preloadhtml-header-link-label">Trade</div>
            <svg class="preloadhtml-dropdown-icon" width="24" height="24" aria-hidden="true">
              <use href="#ks-preload-down" xlink:href="#ks-preload-down" />
            </svg>
          </div>
          <div class="preloadhtml-header-link-item">
            <div class="preloadhtml-header-link-label">
              <span class="preloadhtml-earn-label">
                <img width="20px" height="20px" src="/icons/kem.svg" alt="kemSvg" />
                Earn
              </span>
            </div>
            <svg class="preloadhtml-dropdown-icon" width="24" height="24" aria-hidden="true">
              <use href="#ks-preload-down" xlink:href="#ks-preload-down" />
            </svg>
          </div>
          <div class="preloadhtml-header-link-item hide-max-576">
            <div class="preloadhtml-header-link-label">
              Copy Trading
              <span class="preloadhtml-new-label">New</span>
            </div>
          </div>
          <div class="preloadhtml-header-link-item hide-max-576">
            <div class="preloadhtml-header-link-label">Market</div>
          </div>
          <div class="preloadhtml-header-link-item hide-max-500">
            <div class="preloadhtml-header-link-label">
              Campaigns
              <!-- <span class="preloadhtml-new-label">New</span> -->
            </div>
            <svg class="preloadhtml-dropdown-icon" width="24" height="24" aria-hidden="true">
              <use href="#ks-preload-down" xlink:href="#ks-preload-down" />
            </svg>
          </div>
          <div class="preloadhtml-header-link-item hide-max-992">
            <div class="preloadhtml-header-link-label">KyberDAO</div>
            <svg class="preloadhtml-dropdown-icon" width="24" height="24" aria-hidden="true">
              <use href="#ks-preload-down" xlink:href="#ks-preload-down" />
            </svg>
          </div>
          <div class="preloadhtml-header-link-item hide-max-992">
            <div class="preloadhtml-header-link-label">Analytics</div>
          </div>
          <div class="preloadhtml-header-link-item hide-max-768">
            <div class="preloadhtml-header-link-label">About</div>
            <svg class="preloadhtml-dropdown-icon" width="24" height="24" aria-hidden="true">
              <use href="#ks-preload-down" xlink:href="#ks-preload-down" />
            </svg>
          </div>
        </div>
      </div>
      <!-- ssr-skeleton:start — generic logo loader (SPA fallback / home); scripts/prerender.mjs replaces this
           per-route with that route's page-shell skeleton (the same <RouteFallback> shown post-hydrate). -->
      <div style="height: 180px; display: flex">
        <img
          style="animation: pulse 800ms linear infinite; margin: auto"
          width="160px"
          src="/logo-dark.svg"
          alt="DmmLogo"
        />
      </div>
      <!-- ssr-skeleton:end -->
    </div>
