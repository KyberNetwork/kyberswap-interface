map $uri $swap_intent_redirect {
    default "";
    include /etc/nginx/swap-intent-redirects.map;
}

map $uri $spa_fallback {
    default /index.html;
    ~^/swap(?:/|$) /swap/index.html;
    ~^/limit(?:/|$) /limit/index.html;
}

# Query-bearing pages consolidate into their clean canonical URL. Static HTML still contains the clean
# page's indexable head, so expose the stricter request-specific robots policy in the HTTP response.
map $args $query_robots {
    default "noindex, follow";
    "" "";
}

server {
    listen 80;

    # Behind the edge proxy nginx receives the internal upstream Host. Keep any redirect Location relative
    # so a directory/trailing-slash redirect can't leak the internal cluster hostname to the browser.
    absolute_redirect off;
    port_in_redirect off;

    # Curated buy/sell aliases permanently consolidate into their canonical Swap pair. `map` matches the
    # normalized path without query parameters; keep any attribution parameters on the redirect target.
    if ($swap_intent_redirect != "") {
        return 301 $swap_intent_redirect$is_args$args;
    }

    gzip on;
    gzip_disable "msie6";

    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 0;
    gzip_types text/plain application/javascript text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype;


    # where the root here
    root /var/www;
    # what file to server as index
    index index.html index.htm;

    # Serve the prerendered homepage only for exact `/`. Keep index.html as the empty-body SPA fallback
    # for dynamic routes that cannot be safely enumerated at build time.
    location = / {
        try_files /index-root.html =404;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag $query_robots always;
        add_header Link '<https://kyberswap.com/.well-known/api-catalog>; rel="api-catalog", <https://kyberswap.com/sitemap.xml>; rel="sitemap"; type="application/xml", <https://kyberswap.com/llms.txt>; rel="alternate"; type="text/plain"' always;
        # Per-embedder frame-ancestors (see csp.conf); Referer-dependent -> Vary.
        add_header Content-Security-Policy "frame-ancestors $frame_ancestors" always;
        add_header Vary Referer always;
    }

    location = /index.html {
        add_header Cache-Control no-store always;
        add_header X-Robots-Tag $query_robots always;
        add_header Link '<https://kyberswap.com/.well-known/api-catalog>; rel="api-catalog", <https://kyberswap.com/sitemap.xml>; rel="sitemap"; type="application/xml", <https://kyberswap.com/llms.txt>; rel="alternate"; type="text/plain"' always;
        # Per-embedder frame-ancestors (whitelist + reflection in csp.conf): a non-whitelisted embedder
        # only sees `'self'`, so the partner list can't be enumerated. Depends on Referer -> Vary on it.
        add_header Content-Security-Policy "frame-ancestors $frame_ancestors" always;
        add_header Vary Referer always;
    }

    # Every HTML document embeds the per-deploy hashed JS/CSS chunk URLs. It must NEVER be cached by the
    # browser: otherwise a stale static page or product shell survives a redeploy and
    # requests chunk hashes that no longer exist -> "Failed to fetch dynamically imported module". Without
    # this, prerendered per-route files fall through `location /` with no Cache-Control and the browser
    # caches them heuristically. Only the hashed assets below get long-lived immutable caching.
    location ~* \.html$ {
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag $query_robots always;
        # Per-embedder frame-ancestors (see csp.conf); Referer-dependent -> Vary.
        add_header Content-Security-Policy "frame-ancestors $frame_ancestors" always;
        add_header Vary Referer always;
    }

    location / {
        # Distinct static pages keep their own index.html. Every Swap/Limit child URL falls back to one
        # shared product shell; all other dynamic routes use the generic SPA shell. Try index.html before
        # the directory itself so exact /swap and /limit do not gain a trailing-slash redirect.
        try_files $uri/index.html $uri $spa_fallback =404;
        # `try_files` serves extensionless static routes in this location, so the `.html` regex above is
        # not selected. Set the HTML cache policy here as well to avoid stale hashed asset references.
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag $query_robots always;
        # Advertise agent/SEO discovery endpoints on every HTML response served here. Exact `/` uses the
        # dedicated prerendered document above and declares the same discovery headers there.
        add_header Link '<https://kyberswap.com/.well-known/api-catalog>; rel="api-catalog", <https://kyberswap.com/sitemap.xml>; rel="sitemap"; type="application/xml", <https://kyberswap.com/llms.txt>; rel="alternate"; type="text/plain"' always;
        # Per-embedder frame-ancestors (see csp.conf); Referer-dependent -> Vary.
        add_header Content-Security-Policy "frame-ancestors $frame_ancestors" always;
        add_header Vary Referer always;
    }

    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        try_files $uri =404;
    }

    location = /health {
        access_log off;
        add_header 'Content-Type' 'application/json';
        return 200 '{"status":"UP"}';
    }


    # Media: images, icons, video, audio, HTC
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Javascript and CSS files
    location ~* \.(?:css|js)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # Any route containing a file extension (e.g. /devicesfile.js)
    # location ~ ^.+\..+$ {
    #     try_files $uri =404;
    # }
}
