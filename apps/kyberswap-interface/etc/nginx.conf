server {
    listen 80;

    gzip on;
    gzip_disable "msie6";

    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 0;
    gzip_types text/plain application/javascript text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype;


    # where the root here
    root /var/www;
    # what file to server as index
    index index.html index.htm;

    location = /index.html {
        add_header Cache-Control no-store always;
        add_header Link '<https://kyberswap.com/sitemap.xml>; rel="sitemap"; type="application/xml", <https://kyberswap.com/llms.txt>; rel="alternate"; type="text/plain"' always;
    }

    # Every HTML document embeds the per-deploy hashed JS/CSS chunk URLs. It must NEVER be cached by the
    # browser: otherwise a stale prerendered page (e.g. /swap/ethereum/index.html) survives a redeploy and
    # requests chunk hashes that no longer exist -> "Failed to fetch dynamically imported module". Without
    # this, prerendered per-route files fall through `location /` with no Cache-Control and the browser
    # caches them heuristically. Only the hashed assets below get long-lived immutable caching.
    location ~* \.html$ {
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    location = /health {
        access_log off;
        add_header 'Content-Type' 'application/json';
        return 200 '{"status":"UP"}';
    }


    # Media: images, icons, video, audio, HTC
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Javascript and CSS files
    location ~* \.(?:css|js)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # Any route containing a file extension (e.g. /devicesfile.js)
    # location ~ ^.+\..+$ {
    #     try_files $uri =404;
    # }
}
